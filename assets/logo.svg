<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="SwapMic logo">
  <title>SwapMic</title>
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a0608"/>
      <stop offset="100%" stop-color="#050203"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2a3d"/>
      <stop offset="100%" stop-color="#8a0010"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#cfd0d4"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Swap-arrow ring around the mic. Two opposing arcs with arrowheads. -->
  <g filter="url(#glow)" stroke="url(#ring)" stroke-width="14" fill="none" stroke-linecap="round">
    <path d="M 256 88 A 168 168 0 0 1 410 220"/>
    <path d="M 256 424 A 168 168 0 0 1 102 292"/>
  </g>
  <!-- Arrowheads -->
  <g fill="#ff2a3d" filter="url(#glow)">
    <path d="M 410 220 l -14 -36 l 38 14 z"/>
    <path d="M 102 292 l 14 36 l -38 -14 z"/>
  </g>

  <!-- Microphone -->
  <g transform="translate(256 256)">
    <!-- capsule -->
    <rect x="-46" y="-110" width="92" height="150" rx="46" fill="url(#mic)"/>
    <!-- grille lines -->
    <g stroke="#1a0608" stroke-width="3" opacity="0.65">
      <line x1="-34" y1="-78" x2="34" y2="-78"/>
      <line x1="-34" y1="-58" x2="34" y2="-58"/>
      <line x1="-34" y1="-38" x2="34" y2="-38"/>
      <line x1="-34" y1="-18" x2="34" y2="-18"/>
      <line x1="-34" y1="2"   x2="34" y2="2"/>
      <line x1="-34" y1="22"  x2="34" y2="22"/>
    </g>
    <!-- yoke -->
    <path d="M -76 22 A 76 76 0 0 0 76 22" fill="none" stroke="url(#mic)" stroke-width="10" stroke-linecap="round"/>
    <!-- stem -->
    <rect x="-6" y="86" width="12" height="36" fill="url(#mic)"/>
    <!-- base -->
    <rect x="-46" y="118" width="92" height="10" rx="5" fill="url(#mic)"/>
  </g>

  <!-- 3·6·9 sigil bottom-right, very subtle -->
  <text x="464" y="486" text-anchor="end" font-family="Inter, Helvetica, Arial, sans-serif"
        font-size="18" font-weight="700" fill="#ff2a3d" opacity="0.55" letter-spacing="3">3·6·9</text>
</svg>
